<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Containers</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<!-- Fixed Container -->
<div class="container p-3 my-3 border">
  <h1>Fixed Container</h1>
  <p>Responsive width container.</p>
</div>

<!-- Fluid Container -->
<div class="container-fluid p-3 my-3 bg-dark text-white">
  <h1>Fluid Container</h1>
  <p>Full width container.</p>
</div>

<!-- Responsive Containers -->
<div class="container-sm p-3 my-3 bg-light">Small</div>
<div class="container-md p-3 my-3 bg-warning">Medium</div>
<div class="container-lg p-3 my-3 bg-info">Large</div>
<div class="container-xl p-3 my-3 bg-success">Extra Large</div>

</body>
</html>
